---
openapi: 3.0.3
info:
  title: BOX8-Accounts<> Eatclub Brands APIs
  description: This is the APIs documentation for Box8-Accounts. These are used for
    Customer and user Authentication and Authorization.
  version: 1.0.0
servers:
- url: http://localhost:3000
  description: Local server
- url: https://accounts.box8.co.in
  description: Production server
- url: https://preprod.accounts.box8.co.in
  description: Preprod server
- url: https://uat.accounts.box8.co.in
  description: UAT server
security:
- Authorize: []
paths:
  "/.well-known/openid-configuration":
    get:
      summary: discovery
      tags:
      - Oidc
      responses:
        '200':
          description: returns discovery with /oidc endpoints
          content:
            application/json:
              schema:
                type: object
                properties:
                  issuer:
                    type: string
                  authorization_endpoint:
                    type: string
                  token_endpoint:
                    type: string
                  userinfo_endpoint:
                    type: string
                  jwks_uri:
                    type: string
                  response_types_supported:
                    type: array
                    items:
                      type: string
                  subject_types_supported:
                    type: array
                    items:
                      type: string
                  id_token_signing_alg_values_supported:
                    type: array
                    items:
                      type: string
                  scopes_supported:
                    type: array
                    items:
                      type: string
                  token_endpoint_auth_methods_supported:
                    type: array
                    items:
                      type: string
                  code_challenge_methods_supported:
                    type: array
                    items:
                      type: string
                required:
                - issuer
                - authorization_endpoint
                - token_endpoint
                - userinfo_endpoint
                - jwks_uri
                - response_types_supported
                - subject_types_supported
                - id_token_signing_alg_values_supported
                - scopes_supported
                - token_endpoint_auth_methods_supported
                - code_challenge_methods_supported
              examples:
                get_#discovery_returns_discovery_configuration:
                  summary: 'GET #discovery returns discovery configuration'
                  value:
                    issuer: http://test.host
                    authorization_endpoint: http://test.host/oidc/authorize
                    token_endpoint: http://test.host/oidc/token
                    userinfo_endpoint: http://test.host/oidc/userinfo
                    jwks_uri: http://test.host/oidc/jwks
                    response_types_supported:
                    - code
                    subject_types_supported:
                    - public
                    id_token_signing_alg_values_supported:
                    - RS256
                    scopes_supported:
                    - openid
                    - email
                    - profile
                    token_endpoint_auth_methods_supported:
                    - client_secret_post
                    - client_secret_basic
                    code_challenge_methods_supported:
                    - S256
                    - plain
                returns_discovery_with_/oidc_endpoints:
                  summary: returns discovery with /oidc endpoints
                  value:
                    issuer: http://www.example.com
                    authorization_endpoint: http://www.example.com/oidc/authorize
                    token_endpoint: http://www.example.com/oidc/token
                    userinfo_endpoint: http://www.example.com/oidc/userinfo
                    jwks_uri: http://www.example.com/oidc/jwks
                    response_types_supported:
                    - code
                    subject_types_supported:
                    - public
                    id_token_signing_alg_values_supported:
                    - RS256
                    scopes_supported:
                    - openid
                    - email
                    - profile
                    token_endpoint_auth_methods_supported:
                    - client_secret_post
                    - client_secret_basic
                    code_challenge_methods_supported:
                    - S256
                    - plain
  "/customers/archive":
    put:
      summary: archive
      tags:
      - Customer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties: {}
            examples:
              should_not_work_on_already_archived_customer:
                summary: should not work on already archived customer
                value: {}
              should_not_work_for_blocked_customer:
                summary: should not work for blocked customer
                value: {}
              should_not_change_inactive_customer:
                summary: should not change inactive customer
                value: {}
              should_archive_customer:
                summary: should archive customer
                value: {}
              should_sign_out_customer_on_success:
                summary: should sign_out customer on success
                value: {}
