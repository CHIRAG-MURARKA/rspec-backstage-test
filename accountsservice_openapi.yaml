  "/customers/change_phone":
    post:
      summary: change_phone
      tags:
      - Customer
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                phone_no:
                  type: string
              required:
              - phone_no
            examples:
              with_blank_phone_no:
                summary: with blank phone_no
                value:
                  phone_no: ''
              with_invalid_phone_no:
                summary: with invalid phone_no
                value:
                  phone_no: '12345'
              if_otp_send_limit_exceeds:
                summary: if otp send limit exceeds
                value:
                  phone_no: '6743041874'
              if_wrongly_entered_phone_no_of_other_customer_first_but_after_change_customer_with_new_phone_number_also_exists:
                summary: if wrongly entered phone_no of other customer first but after
                  change customer with new phone number also exists
                value:
                  phone_no: '5133422214'
              if_wrongly_entered_phone_no_of_other_customer_but_after_change_customer_with_new_phone_number_does_not_exist:
                summary: if wrongly entered phone_no of other customer but after change
                  customer with new phone number does not exist
                value:
                  phone_no: '5361946116'
              was_signing_up_but_changed_phone_no_and_the_new_phone_no_also_does_not_exist:
                summary: was signing_up but changed phone_no and the new phone_no
                  also does not exist
                value:
                  phone_no: '5152120671'
              was_doing_native_sign_up_but_changed_phone_no_but_customer_with_new_phone_no_already_exist:
                summary: was doing native sign_up but changed phone_no but customer
                  with new phone_no already exist
                value:
                  phone_no: '9079735668'
              was_signing_up_with_google_and_changed_phone_no:
                summary: was signing_up with google and changed phone_no
                value:
                  phone_no: '5692681106'
      responses:
        '200':
          description: was signing_up with google and changed phone_no
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    type: object
                    properties:
                      code:
                        type: integer
                      status:
                        type: string
                      message:
                        type: string
                      error:
                        type: boolean
                      version:
                        type: string
                      copyright:
                        type: string
                      body:
                        nullable: true
                    required:
                    - code
                    - status
                    - message
                    - error
                    - version
                    - copyright
                required:
                - meta
              examples:
                with_blank_phone_no:
                  summary: with blank phone_no
                  value:
                    meta:
                      code: 400
                      status: Not OK
                      message: Please enter mobile number
                      error: true
                      version: '1.0'
                      copyright: Copyright 2015 Box8
                with_invalid_phone_no:
                  summary: with invalid phone_no
                  value:
                    meta:
                      code: 400
                      status: Not OK
                      message: Please enter valid mobile number
                      error: true
                      version: '1.0'
                      copyright: Copyright 2015 Box8
                if_otp_send_limit_exceeds:
                  summary: if otp send limit exceeds
                  value:
                    meta:
                      code: 400
                      status: Not OK
                      message: You have exceeded OTP Request limit. Kindly wait for
                        2 minute(s) for next OTP Request.
                      error: true
                      version: '1.0'
                      copyright: Copyright 2015 Box8
                if_wrongly_entered_phone_no_of_other_customer_first_but_after_change_customer_with_new_phone_number_also_exists:
                  summary: if wrongly entered phone_no of other customer first but
                    after change customer with new phone number also exists
                  value:
                    meta:
                      code: 200
                      status: OK
                      message: OTP generated and sent successfully
                      error: false
                      version: '1.0'
                      copyright: Copyright 2015 Box8
                if_wrongly_entered_phone_no_of_other_customer_but_after_change_customer_with_new_phone_number_does_not_exist:
                  summary: if wrongly entered phone_no of other customer but after
                    change customer with new phone number does not exist
                  value:
                    meta:
                      code: 202
                      status: OK
                      message: This mobile number is not registered. Please Sign up!
                      error: false
                      version: '1.0'
                      copyright: Copyright 2015 Box8
                was_signing_up_but_changed_phone_no_and_the_new_phone_no_also_does_not_exist:
                  summary: was signing_up but changed phone_no and the new phone_no
                    also does not exist
                  value:
                    meta:
                      code: 200
                      status: OK
                      message: 'OTP generated and sent successfully '
                      error: false
                      version: '1.0'
                      copyright: Copyright 2015 Box8
                was_doing_native_sign_up_but_changed_phone_no_but_customer_with_new_phone_no_already_exist:
                  summary: was doing native sign_up but changed phone_no but customer
                    with new phone_no already exist
                  value:
                    meta:
                      code: 203
                      status: OK
                      message: This mobile number is already registered. Please enter
                        otp to sign in!
                      error: false
                      body:
                      version: '1.0'
                      copyright: Copyright 2015 Box8
                was_signing_up_with_google_and_changed_phone_no:
                  summary: was signing_up with google and changed phone_no
                  value:
                    meta:
                      code: 200
                      status: OK
                      message: OTP generated and sent successfully
                      error: false
                      version: '1.0'
                      copyright: Copyright 2015 Box8
