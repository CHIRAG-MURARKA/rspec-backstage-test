  "/customers/reset_password":
    post:
      summary: reset_password_create
      tags:
      - Customer
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                phone_no:
                  type: string
              required:
              - phone_no
            examples:
              should_not_send_reset_password_otp_for_invalid_phone_no:
                summary: should not send reset_password otp for invalid phone_no
                value:
                  phone_no: '1234567890'
              should_not_send_reset_password_otp_on_phone_if_customer_is_not_present:
                summary: should not send reset_password otp on phone if customer is
                  not present
                value:
                  phone_no: '5000562991'
              should_send_reset_password_otp_on_phone_if_customer_is_present:
                summary: should send reset_password otp on phone if customer is present
                value:
                  phone_no: '8842053407'
              should_not_send_reset_password_otp_on_phone_if_limit_exceeds:
                summary: should not send reset_password otp on phone if limit exceeds
                value:
                  phone_no: '7994522494'
              should_not_support_reset_password_create:
                summary: should not support reset_password_create
                value:
                  phone_no: '8598542979'
      responses:
        '200':
          description: should not support reset_password_create
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    type: object
                    properties:
                      code:
                        type: integer
                      status:
                        type: string
                      message:
                        type: string
                      error:
                        type: boolean
                      version:
                        type: string
                      copyright:
                        type: string
                    required:
                    - code
                    - status
                    - message
                    - error
                    - version
                    - copyright
                required:
                - meta
              examples:
                should_not_send_reset_password_otp_for_invalid_phone_no:
                  summary: should not send reset_password otp for invalid phone_no
                  value:
                    meta:
                      code: 400
                      status: Not OK
                      message: Please enter valid Mobile number
                      error: true
                      version: '1.0'
                      copyright: Copyright 2015 Box8
                should_not_send_reset_password_otp_on_phone_if_customer_is_not_present:
                  summary: should not send reset_password otp on phone if customer
                    is not present
                  value:
                    meta:
                      code: 400
                      status: Not OK
                      message: We didn't recognize your mobile number, please sign
                        up.
                      error: true
                      version: '1.0'
                      copyright: Copyright 2015 Box8
                should_send_reset_password_otp_on_phone_if_customer_is_present:
                  summary: should send reset_password otp on phone if customer is
                    present
                  value:
                    meta:
                      code: 200
                      status: OK
                      message: Verification Code to reset password has been sent.
                      error: false
                      version: '1.0'
                      copyright: Copyright 2015 Box8
                should_not_send_reset_password_otp_on_phone_if_limit_exceeds:
                  summary: should not send reset_password otp on phone if limit exceeds
                  value:
                    meta:
                      code: 400
                      status: Not OK
                      message: Too many password reset attempt. Please try after 1
                        hour.
                      error: true
                      version: '1.0'
                      copyright: Copyright 2015 Box8
                should_not_support_reset_password_create:
                  summary: should not support reset_password_create
                  value:
                    meta:
                      code: 400
                      status: Not OK
                      message: Action Not Supported!
                      error: true
                      version: '1.0'
                      copyright: Copyright 2015 Box8
