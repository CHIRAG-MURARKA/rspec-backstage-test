  "/customers/get_refresh_token":
    get:
      summary: refresh_token
      tags:
      - Customer
      responses:
        '200':
          description: should refresh token for valid expired unsigned_token
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    type: object
                    properties:
