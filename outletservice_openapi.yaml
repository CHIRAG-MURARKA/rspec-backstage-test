---
openapi: 3.0.3
info:
  title: Box8outletservice API
  description: API for managing group accounts, including electron versions, IoT devices,
    AnyDesk IDs, and outlet statuses.
  version: 1.0.0
servers:
- url: http://localhost:3000
  description: Local server
- url: https://outletservice.box8.co.in
  description: Production server
- url: https://preprod-outletservice.box8.co.in
  description: Preprod server
- url: https://uat-outletservice.box8.co.in
  description: UAT server
security:
- Authorize: []
paths:
  "/camera_script/fetch_cloud_destination":
    get:
      summary: fetch_cloud_destination
      tags:
      - CameraScript
      responses:
        '200':
          description: valid request
          content:
            application/json:
              schema:
                type: object
                properties:
                  storage:
                    type: string
                  meta:
                    type: object
                    properties:
                      code:
                        type: integer
                      status:
                        type: string
                      message:
                        type: string
                      error:
                        type: boolean
                      body:
                        type: object
                        properties:
                          storage:
                            type: string
                        required:
                        - storage
                      version:
                        type: string
                      copyright:
                        type: string
                    required:
                    - code
                    - status
                    - message
                    - error
                    - body
                    - version
                    - copyright
                required:
                - storage
                - meta
              examples:
                missing_request_header:
                  summary: missing request header
                  value:
                    meta:
                      code: 498
                      status: Not OK
                      message: Your session has expired. Please try again.
                      error: true
                      version: '1.0'
                      copyright: Copyright 2015 Box8
                unauthorized_request:
                  summary: unauthorized request
                  value:
                    meta:
                      code: 401
                      status: Not OK
                      message: Unauthorized
                      error: true
                      version: '1.0'
                      copyright: Copyright 2015 Box8
                without_outlet_code:
                  summary: without outlet code
                  value:
                    meta:
                      code: 400
                      status: Not OK
                      message: Invalid Request
                      error: true
                      version: '1.0'
                      copyright: Copyright 2015 Box8
                    error: is missing
                valid_request:
                  summary: valid request
                  value:
                    storage: AWS
                    meta:
                      code: 200
                      status: OK
                      message: Destination Found
                      error: false
                      body:
                        storage: AWS
                      version: '1.0'
                      copyright: Copyright 2015 Box8
      parameters:
      - name: outlet_code
        in: query
        required: false
        schema:
          type: string
        examples:
          valid_request:
            value: KIN-0001
  "/camera_script/fetch_digital_ocean_bucket":
    get:
      summary: fetch_digital_ocean_bucket
      tags:
      - CameraScript
      parameters:
      - name: outlet_code
        in: query
        required: false
        schema:
          type: string
        examples:
          unauthorzied_request:
            value: KIN-0001
          valid_request:
            value: KIN-0001
      - name: source
        in: query
        required: false
        schema:
          type: string
        examples:
          unauthorzied_request:
            value: camera-script
          missing_outlet_code_in_params:
            value: camera-script
          valid_request:
            value: camera-script
      responses:
        '200':
          description: valid request
          content:
            application/json:
              schema:
                type: object
                properties:
                  bucket:
                    type: string
                  meta:
                    type: object
                    properties:
                      code:
                        type: integer
                      status:
                        type: string
                      message:
                        type: string
                      error:
                        type: boolean
                      body:
                        type: object
                        properties:
                          bucket:
                            type: string
                        required:
                        - bucket
                      version:
                        type: string
                      copyright:
                        type: string
                    required:
                    - code
                    - status
                    - message
                    - error
                    - body
                    - version
                    - copyright
                required:
                - bucket
                - meta
              examples:
                unauthorzied_request:
                  summary: unauthorzied request
                  value:
                    meta:
                      code: 401
                      status: Not OK
                      message: Unauthorized
                      error: true
                      version: '1.0'
                      copyright: Copyright 2015 Box8
                missing_outlet_code_in_params:
                  summary: missing outlet code in params
                  value:
                    meta:
                      code: 400
                      status: Not OK
                      message: Invalid Request
                      error: true
                      version: '1.0'
                      copyright: Copyright 2015 Box8
                    error: is missing
                valid_request:
                  summary: valid request
                  value:
                    bucket: 49aeed4b5-outletipcam-1
                    meta:
                      code: 200
                      status: OK
                      message: Digital Ocean Bucket Found
                      error: false
                      body:
                        bucket: 49aeed4b5-outletipcam-1
                      version: '1.0'
                      copyright: Copyright 2015 Box8
  "/camera_script/update_channel":
    post:
      summary: update_channel_to_ip_details
      tags:
      - CameraScript
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                channel_map:
                  type: object
                  properties:
                    '2':
                      type: string
                    '1':
                      type: string
                  required:
                  - '2'
                  - '1'
              required:
              - channel_map
            examples:
              unauthorzied_request:
                summary: unauthorzied request
                value:
                  channel_map:
                    '2': 192.168.9.254
                    '1': 192.168.9.30
              successful_channel_update:
                summary: successful channel update
                value:
                  channel_map:
                    '2': 192.168.9.254
                    '1': 192.168.9.30
              invalid_params:
                summary: Invalid Params
                value: {}
      responses:
        '200':
          description: Invalid Params
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    type: object
                    properties:
                      code:
                        type: integer
                      status:
                        type: string
                      message:
                        type: string
                      error:
                        type: boolean
                      body:
                        type: object
                        properties:
                          failed_ip:
                            type: array
                            items:
                              type: string
                        required:
                        - failed_ip
                      version:
                        type: string
                      copyright:
                        type: string
                    required:
                    - code
                    - status
                    - message
                    - error
                    - body
                    - version
                    - copyright
                required:
                - meta
              examples:
                unauthorzied_request:
                  summary: unauthorzied request
                  value:
                    meta:
                      code: 401
                      status: Not OK
                      message: Unauthorized
                      error: true
                      version: '1.0'
                      copyright: Copyright 2015 Box8
                successful_channel_update:
                  summary: successful channel update
                  value:
                    meta:
                      code: 200
                      status: OK
                      message: Failed Ips found
                      error: false
                      body:
                        failed_ip:
                        - 192.168.9.254
                        - 192.168.9.30
                      version: '1.0'
                      copyright: Copyright 2015 Box8
                invalid_params:
                  summary: Invalid Params
                  value:
                    meta:
                      code: 400
                      status: Not OK
                      message: Invalid Request
                      error: true
                      version: '1.0'
                      copyright: Copyright 2015 Box8
                    error: is missing
  "/group_account/create":
    post:
      summary: create
      tags:
      - GroupAccount
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                outlet_code:
                  type: string
                email:
                  type: string
                name:
                  type: string
                outlet_ids:
                  type: array
                  items:
                    type: integer
                business_unit_id:
                  type: integer
                outlet_address:
                  type: string
                anydesk_id:
                  type: string
                active:
                  type: boolean
                billing_properties_id:
                  type: integer
                common_variables_id:
                  type: integer
                routers:
                  type: object
                  properties:
                    wifi1:
                      type: string
                    wifi2:
                      type: string
                    password1:
                      type: string
                    password2:
                      type: string
                    isp1:
                      type: string
                    isp2:
                      type: string
                  required:
                  - wifi1
                  - wifi2
                  - password1
                  - password2
                  - isp1
                  - isp2
                outlet_id:
                  type: integer
              required:
              - outlet_code
              - email
              - name
              - outlet_ids
              - business_unit_id
              - outlet_address
              - anydesk_id
              - active
              - billing_properties_id
              - common_variables_id
              - routers
              - outlet_id
            examples:
              misssing_token:
                summary: misssing token
                value:
                  outlet_code: NEW-1234
                  email: new@box8.in
                  outlet_address: new outlet
                  anydesk: '99998888'
                  active: 'True'
                  routers:
                    wifi1: akhd
                    wifi2: jfdas
                    password1: dfd
                    password2: hfodif
                    isp1: airtel
                    isp2: jio
              unauthorized_request:
                summary: unauthorized request
                value:
                  outlet_code: ''
                  email: new@box8.in
                  outlet_address: new outlet
                  anydesk: '99998888'
                  active: 'True'
                  routers:
                    wifi1: akhd
                    wifi2: jfdas
                    password1: dfd
                    password2: hfodif
                    isp1: airtel
                    isp2: jio
              outlet_code_missing:
                summary: outlet code missing
                value:
                  outlet_code: ''
                  email: new@box8.in
                  outlet_address: new outlet
                  anydesk: '99998888'
                  active: 'True'
                  routers:
                    wifi1: akhd
                    wifi2: jfdas
                    password1: dfd
                    password2: hfodif
                    isp1: airtel
                    isp2: jio
              email_missing:
                summary: email missing
                value:
                  outlet_code: NEW-1234
                  email: ''
                  outlet_address: new outlet
                  anydesk: '99998888'
                  active: 'True'
                  routers:
                    wifi1: akhd
                    wifi2: jfdas
                    password1: dfd
                    password2: hfodif
                    isp1: airtel
                    isp2: jio
              name_missing:
                summary: name missing
                value:
                  outlet_code: NEW-1234
                  email: new@box8.in
                  outlet_ids:
                  - 1
                  - 2
                  business_unit_id: 1
                  outlet_address: new outlet
                  anydesk_id: '99998888'
                  active: true
                  billing_properties_id: 1
                  common_variables_id: 1
                  routers:
                    wifi1: akhd
                    wifi2: jfdas
                    password1: dfd
                    password2: hfodif
                    isp1: airtel
                    isp2: jio
              valid_request:
                summary: valid request
                value:
                  outlet_code: NEW-1234
                  email: new@box8.in
                  name: TEST_OUTLET
                  outlet_ids:
                  - 1
                  - 2
                  business_unit_id: 1
                  outlet_address: new outlet
                  anydesk_id: '99998888'
                  active: true
                  billing_properties_id: 1
                  common_variables_id: 1
                  routers:
                    wifi1: akhd
                    wifi2: jfdas
                    password1: dfd
                    password2: hfodif
                    isp1: airtel
                    isp2: jio
                  outlet_id: 4
      responses:
        '200':
          description: valid request
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    type: object
                    properties:
                      code:
                        type: integer
                      status:
                        type: string
                      message:
                        type: string
                      error:
                        type: boolean
                      body:
                        type: object
                        properties:
                          group_account:
                            type: object
                            properties:
                              id:
                                type: integer
                              outlet_code:
                                type: string
                              email:
                                type: string
                              outlet_address:
                                type: string
                              common_variables_id:
                                type: integer
                              active:
                                type: boolean
                              created_at:
                                type: string
                              updated_at:
                                type: string
                              outlet_id:
                                type: integer
                            required:
                            - id
                            - outlet_code
                            - email
                            - outlet_address
                            - common_variables_id
                            - active
                            - created_at
                            - updated_at
                            - outlet_id
                        required:
                        - group_account
                      version:
                        type: string
                      copyright:
                        type: string
                    required:
                    - code
                    - status
                    - message
                    - error
                    - body
                    - version
                    - copyright
                required:
                - meta
              examples:
                misssing_token:
                  summary: misssing token
                  value:
                    meta:
                      code: 498
                      status: Not OK
                      message: Your session has expired. Please try again.
                      error: true
                      version: '1.0'
                      copyright: Copyright 2015 Box8
                unauthorized_request:
                  summary: unauthorized request
                  value:
                    meta:
                      code: 401
                      status: Not OK
                      message: Unauthorized
                      error: true
                      version: '1.0'
                      copyright: Copyright 2015 Box8
                outlet_code_missing:
                  summary: outlet code missing
                  value:
                    meta:
                      code: 400
                      status: Not OK
                      message: Invalid Request
                      error: true
                      version: '1.0'
                      copyright: Copyright 2015 Box8
                    error: must be filled | is missing | is missing | must be boolean
                email_missing:
                  summary: email missing
                  value:
                    meta:
                      code: 400
                      status: Not OK
                      message: Invalid Request
                      error: true
                      version: '1.0'
                      copyright: Copyright 2015 Box8
                    error: must be filled | is missing | is missing | must be boolean
                name_missing:
                  summary: name missing
                  value:
                    meta:
                      code: 400
                      status: Not OK
                      message: Invalid Request
                      error: true
                      version: '1.0'
                      copyright: Copyright 2015 Box8
                    error: is missing | is missing
                valid_request:
                  summary: valid request
                  value:
                    meta:
                      code: 200
                      status: OK
                      message: Group Account Created
                      error: false
                      body:
                        group_account:
                          id: 4
                          outlet_code: NEW-1234
                          email: new@box8.in
                          outlet_address: new outlet
                          common_variables_id: 1
                          active: true
                          created_at: '2026-03-03T23:05:02.473+05:30'
                          updated_at: '2026-03-03T23:05:02.473+05:30'
                          outlet_id: 4
                      version: '1.0'
                      copyright: Copyright 2015 Box8
  "/group_account/fetch_iot_device_latest_details":
