        in: query
        required: false
        schema:
          type: string
        examples:
          outlet_code_missing:
            value: 2.9.9
          outlet_code_is_null_and_enforced_version_different_from_current:
            value: 2.9.9
          outlet_code_is_null_and_enforced_version_is_same_as_current:
            value: 2.0.32
          current_version_missing:
            value: ''
          invalid_outlet_code:
            value: 2.9.9
          all_seems_working_fine:
            value: 2.0.32
      - name: outlet_code
        in: query
        required: false
        schema:
          type: string
        examples:
